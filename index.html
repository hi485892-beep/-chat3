<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; }

  .ig-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #000; z-index: 100; }
  .ig-topbar-back { font-size: 22px; cursor: pointer; color: #fff; }
  .ig-topbar-username { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .ig-topbar-more { font-size: 22px; cursor: pointer; }

  .profile-section { padding: 16px 16px 12px; }
  .profile-top { display: flex; align-items: center; gap: 24px; margin-bottom: 16px; }
  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar-ring { width: 88px; height: 88px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg,#b09fff,#d4baff,#a8d4ff,#ffd6f5,#b09fff); background-size:200% 200%; animation: ringShimmer 3s ease infinite; }
  @keyframes ringShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .avatar-inner { width:100%; height:100%; border-radius:50%; background:#111; border:2px solid #000; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .stats-row { display:flex; gap:20px; flex:1; justify-content:space-around; }
  .stat-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .stat-num { font-size:17px; font-weight:600; }
  .stat-label { font-size:13px; color:#a8a8a8; }
  .bio-section { margin-bottom:14px; }
  .bio-name { font-size:14px; font-weight:600; margin-bottom:3px; }
  .bio-text { font-size:14px; line-height:1.5; white-space:pre-line; }
  .bio-link { font-size:14px; color:#b09fff; text-decoration:none; display:inline-block; margin-top:4px; }
  .action-buttons { display:flex; gap:8px; margin-bottom:16px; }
  .btn-follow { flex:1; background:linear-gradient(90deg,#b09fff,#d4baff,#a8d4ff); background-size:200% 100%; animation:btnShimmer 4s ease infinite; color:#000; font-size:14px; font-weight:600; padding:7px 0; border-radius:8px; border:none; cursor:pointer; }
  @keyframes btnShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .btn-msg { flex:1; background:#1a1a1a; color:#fff; font-size:14px; font-weight:600; padding:7px 0; border-radius:8px; border:1px solid #333; cursor:pointer; }
  .btn-chevron { background:#1a1a1a; color:#fff; font-size:14px; font-weight:600; padding:7px 12px; border-radius:8px; border:1px solid #333; cursor:pointer; }

  .highlights-section { padding:4px 16px 16px; overflow-x:auto; display:flex; gap:16px; scrollbar-width:none; }
  .highlights-section::-webkit-scrollbar { display:none; }
  .highlight-item { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; cursor:pointer; }
  .highlight-ring { width:64px; height:64px; border-radius:50%; padding:2px; background:#262626; border:1px solid #333; }
  .highlight-inner { width:100%; height:100%; border-radius:50%; background:linear-gradient(135deg,#1a1030,#0d0d1a); display:flex; align-items:center; justify-content:center; font-size:22px; border:2px solid #000; }
  .highlight-label { font-size:11px; color:#e0e0e0; text-align:center; }

  .tabs-bar { display:flex; border-top:1px solid #262626; border-bottom:1px solid #262626; }
  .tab { flex:1; display:flex; align-items:center; justify-content:center; padding:12px; cursor:pointer; border-bottom:2px solid transparent; color:#a8a8a8; font-size:20px; }
  .tab.active { color:#fff; border-bottom-color:#fff; }

  .posts-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
  .post-cell { aspect-ratio:1/1; position:relative; overflow:hidden; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity 0.15s; }
  .post-cell:hover { opacity:0.85; }
  .post-bg { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:32px; }

  .verified { display:inline-block; width:14px; height:14px; background:linear-gradient(135deg,#b09fff,#a8d4ff); border-radius:50%; position:relative; margin-left:4px; vertical-align:middle; }
  .verified::after { content:"✓"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:8px; color:#000; font-weight:700; }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#000; border-top:1px solid #262626; display:flex; justify-content:space-around; align-items:center; padding:10px 0 24px; z-index:100; }
  .bottom-nav-item { cursor:pointer; font-size:24px; }
  .spacer { height:80px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .post-modal { display:flex; width:min(95vw,900px); max-height:90vh; background:#000; border:1px solid #262626; border-radius:4px; overflow:hidden; }
  .modal-image-side { flex:0 0 55%; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .modal-img-placeholder { width:100%; height:100%; min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .modal-detail-side { flex:1; display:flex; flex-direction:column; border-left:1px solid #262626; max-height:90vh; overflow:hidden; }
  .modal-header { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #262626; flex-shrink:0; }
  .modal-avatar-small { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#1a0f35,#0d1a30); display:flex; align-items:center; justify-content:center; font-size:10px; color:#b09fff; font-weight:700; flex-shrink:0; }
  .modal-username { font-size:14px; font-weight:600; flex:1; }
  .modal-more { font-size:20px; color:#fff; cursor:pointer; background:none; border:none; }
  .modal-comments { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:16px; scrollbar-width:thin; scrollbar-color:#333 transparent; }
  .comment-item { display:flex; gap:12px; align-items:flex-start; }
  .comment-avatar { width:32px; height:32px; border-radius:50%; overflow:hidden; flex-shrink:0; background:#222; display:flex; align-items:center; justify-content:center; font-size:11px; color:#888; }
  .comment-body { flex:1; }
  .comment-text { font-size:14px; line-height:1.5; }
  .comment-text strong { font-weight:600; margin-right:4px; }
  .comment-meta { display:flex; gap:14px; margin-top:6px; align-items:center; }
  .comment-time { font-size:12px; color:#a8a8a8; }
  .comment-likes-label { font-size:12px; color:#a8a8a8; }
  .comment-reply-btn { font-size:12px; color:#a8a8a8; cursor:pointer; font-weight:600; }
  .comment-heart-btn { margin-left:auto; color:#a8a8a8; font-size:14px; cursor:pointer; border:none; background:none; }
  .replies-toggle { font-size:12px; color:#a8a8a8; cursor:pointer; margin-top:8px; display:flex; align-items:center; gap:8px; }
  .replies-toggle::before { content:""; display:inline-block; width:24px; height:1px; background:#a8a8a8; }
  .modal-actions { border-top:1px solid #262626; padding:10px 16px; flex-shrink:0; }
  .action-icons { display:flex; gap:16px; align-items:center; margin-bottom:8px; }
  .action-icon { font-size:22px; cursor:pointer; background:none; border:none; color:#fff; }
  .likes-count { font-size:14px; font-weight:600; margin-bottom:4px; }
  .post-date { font-size:11px; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.05em; }
  .modal-comment-input { border-top:1px solid #262626; padding:12px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .nickname-input { background:#111; border:1px solid #333; color:#fff; font-size:13px; padding:6px 10px; border-radius:8px; outline:none; width:90px; font-family:inherit; }
  .nickname-input::placeholder { color:#666; }
  .comment-input { flex:1; background:none; border:none; color:#fff; font-size:14px; outline:none; font-family:inherit; }
  .comment-input::placeholder { color:#a8a8a8; }
  .post-btn { font-size:14px; font-weight:600; color:#b09fff; background:none; border:none; cursor:pointer; opacity:0.4; }
  .post-btn.active { opacity:1; }
  .modal-close-btn { position:fixed; top:20px; right:20px; z-index:300; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; display:none; }
  .modal-overlay.open ~ .modal-close-btn { display:block; }

  .loading-comments { color:#a8a8a8; font-size:13px; text-align:center; padding:20px 0; }
  .akgae { background:#200a20 !important; color:#ff88ff !important; }

  @media (max-width:600px) {
    .post-modal { flex-direction:column; width:100vw; max-height:100vh; border-radius:0; }
    .modal-image-side { flex:0 0 45vw; min-height:45vw; }
    .modal-detail-side { border-left:none; border-top:1px solid #262626; }
  }
</style>

// ── 모달 렌더 ─────────────────────────────────────────────────────────
const modalsContainer = document.getElementById('modalsContainer');

function fmtLikes(n) { return n >= 10000 ? (n/10000).toFixed(1)+'만' : n.toLocaleString(); }

function buildModal(p) {
  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'modal'+p.id;
  div.onclick = e => { if(e.target===div) closePost(p.id); };

  div.innerHTML = `
    <div class="post-modal">
      <div class="modal-image-side">
        <div class="modal-img-placeholder" style="background:${p.grad}">
          <div style="font-size:72px">${p.emoji}</div>
          <div style="font-size:13px;color:#b09fff;letter-spacing:0.1em">${p.member}</div>
        </div>
      </div>
      <div class="modal-detail-side">
        <div class="modal-header">
          <div class="modal-avatar-small">AU</div>
          <span class="modal-username">AURAofficial <span class="verified"></span></span>
          <span style="font-size:12px;color:#a8a8a8;margin-left:4px;">${p.member}</span>
          <button class="modal-more" onclick="closePost(${p.id})">✕</button>
        </div>
        <div class="modal-comments" id="commentsArea${p.id}">
          <div class="comment-item">
            <div class="comment-avatar" style="background:linear-gradient(135deg,#1a0f35,#0d1a30);font-size:10px;color:#b09fff;font-weight:700;">AU</div>
            <div class="comment-body">
              <div class="comment-text"><strong>AURAofficial</strong> ${p.caption.replace(/\n/g,'<br>').replace(/#(\S+)/g,'<span style="color:#b09fff;">#$1</span>')}</div>
              <div class="comment-meta"><span class="comment-time">${p.date}</span><span class="comment-reply-btn">답글 달기</span></div>
            </div>
            <button class="comment-heart-btn">♡</button>
          </div>
          <div id="presetComments${p.id}"></div>
          <div id="sharedComments${p.id}"><div class="loading-comments">댓글 불러오는 중...</div></div>
        </div>
        <div class="modal-actions">
          <div class="action-icons">
            <button class="action-icon" id="mainHeart${p.id}" onclick="toggleMainHeart(${p.id},${p.baseLikes})">♡</button>
            <button class="action-icon" onclick="focusComment(${p.id})">💬</button>
            <button class="action-icon">↗</button>
            <button class="action-icon" style="margin-left:auto;">🔖</button>
          </div>
          <div class="likes-count">좋아요 <span id="likeNum${p.id}">${fmtLikes(p.baseLikes)}</span>개</div>
          <div class="post-date">${p.date}</div>
        </div>
        <div class="modal-comment-input">
          <input class="nickname-input" id="nickInput${p.id}" type="text" placeholder="닉네임" maxlength="20">
          <input class="comment-input" id="commentInput${p.id}" type="text" placeholder="댓글 달기..." oninput="togglePostBtn(${p.id})">
          <button class="post-btn" id="postBtn${p.id}" onclick="addComment(${p.id})">게시</button>
        </div>
      </div>
    </div>`;
  modalsContainer.appendChild(div);

  // 프리셋 댓글 렌더
  const presetArea = div.querySelector('#presetComments'+p.id);
  p.presetComments.forEach(c => {
    presetArea.innerHTML += `
      <div class="comment-item">
        <div class="comment-avatar" style="background:${c.bg};color:${c.color};${c.akgae?'font-size:16px;':'font-size:11px;'}">${c.avatar}</div>
        <div class="comment-body">
          <div class="comment-text"><strong>${c.user}</strong> ${c.text}</div>
          <div class="comment-meta">
            <span class="comment-time">${c.time}</span>
            <span class="comment-likes-label">좋아요 ${c.likes}개</span>
            <span class="comment-reply-btn">답글 달기</span>
          </div>
          ${c.replies ? `<div class="replies-toggle">답글 보기 (${c.replies}개)</div>` : ''}
        </div>
        <button class="comment-heart-btn">♡</button>
      </div>`;
  });
}

POSTS.forEach(buildModal);

// ── 상태 ─────────────────────────────────────────────────────────────
const likedState = {};
POSTS.forEach(p => likedState[p.id] = false);

function openPost(id) {
  document.getElementById('modal'+id).classList.add('open');
  document.body.style.overflow = 'hidden';
  loadSharedComments(id);
}
function closePost(id) {
  document.getElementById('modal'+id).classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') POSTS.forEach(p => closePost(p.id)); });

function toggleMainHeart(id, base) {
  likedState[id] = !likedState[id];
  const btn = document.getElementById('mainHeart'+id);
  btn.textContent = likedState[id] ? '♥' : '♡';
  btn.style.color = likedState[id] ? '#ed4956' : '#fff';
  document.getElementById('likeNum'+id).textContent = fmtLikes(base + (likedState[id] ? 1 : 0));
}

function focusComment(id) { document.getElementById('commentInput'+id).focus(); }

function togglePostBtn(id) {
  const v = document.getElementById('commentInput'+id).value.trim();
  document.getElementById('postBtn'+id).classList.toggle('active', v.length > 0);
}

// ── 공유 댓글 저장/로드 ──────────────────────────────────────────────
async function loadSharedComments(postId) {
  const area = document.getElementById('sharedComments'+postId);
  area.innerHTML = '<div class="loading-comments">댓글 불러오는 중...</div>';
  try {
    const result = await window.storage.get('comments_post_'+postId, true);
    const comments = result ? JSON.parse(result.value) : [];
    renderSharedComments(postId, comments);
  } catch(e) {
    renderSharedComments(postId, []);
  }
}

function renderSharedComments(postId, comments) {
  const area = document.getElementById('sharedComments'+postId);
  if (!comments.length) { area.innerHTML = ''; return; }
  area.innerHTML = comments.map(c => `
    <div class="comment-item">
      <div class="comment-avatar" style="background:#1a0f30;font-size:11px;color:#b09fff;">${c.nick.charAt(0)}</div>
      <div class="comment-body">
        <div class="comment-text"><strong>${escHtml(c.nick)}</strong> ${escHtml(c.text)}</div>
        <div class="comment-meta"><span class="comment-time">${c.time}</span><span class="comment-reply-btn">답글 달기</span></div>
      </div>
      <button class="comment-heart-btn">♡</button>
    </div>`).join('');
  // 스크롤 맨 아래
  const commentsArea = document.getElementById('commentsArea'+postId);
  commentsArea.scrollTop = commentsArea.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo() {
  const now = new Date();
  return `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

async function addComment(postId) {
  const nickEl = document.getElementById('nickInput'+postId);
  const inp = document.getElementById('commentInput'+postId);
  const nick = nickEl.value.trim() || '익명';
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  nickEl.value = '';
  document.getElementById('postBtn'+postId).classList.remove('active');

  // 낙관적 UI
  const area = document.getElementById('commentsArea'+postId);
  const tempDiv = document.createElement('div');
  tempDiv.className = 'comment-item';
  tempDiv.innerHTML = `
    <div class="comment-avatar" style="background:#1a0f30;font-size:11px;color:#b09fff;">${nick.charAt(0)}</div>
    <div class="comment-body">
      <div class="comment-text"><strong>${escHtml(nick)}</strong> ${escHtml(text)}</div>
      <div class="comment-meta"><span class="comment-time">방금</span></div>
    </div>
    <button class="comment-heart-btn">♡</button>`;
  const sharedArea = document.getElementById('sharedComments'+postId);
  sharedArea.appendChild(tempDiv);
  area.scrollTop = area.scrollHeight;

  // 저장소에 저장
  try {
    let comments = [];
    try {
      const result = await window.storage.get('comments_post_'+postId, true);
      comments = result ? JSON.parse(result.value) : [];
    } catch(e) { comments = []; }
    comments.push({ nick, text, time: timeAgo() });
    // 최대 200개
    if (comments.length > 200) comments = comments.slice(-200);
    await window.storage.set('comments_post_'+postId, JSON.stringify(comments), true);
    // 다시 렌더 (방금 추가 포함)
    renderSharedComments(postId, comments);
  } catch(e) {
    console.error('저장 실패:', e);
  }
}
</script>
